name: Deploy to Staging

on:
  push:
    branches: [test]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'deploy/**'
      - 'rush.json'
      - 'common/config/rush/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  SERVICE_NAME: v2-container-service-1
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install lightsailctl
        run: |
          curl -s "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o /usr/local/bin/lightsailctl
          chmod +x /usr/local/bin/lightsailctl

      - name: Build backend Docker image
        run: |
          docker build \
            -f deploy/backend.Dockerfile \
            -t newmeca-backend:latest \
            .

      - name: Build nginx/frontend Docker image
        run: |
          docker build \
            -f deploy/nginx.Dockerfile \
            --build-arg VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_API_URL="" \
            --build-arg VITE_RECAPTCHA_SITE_KEY="${{ secrets.VITE_RECAPTCHA_SITE_KEY }}" \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY="${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}" \
            --build-arg VITE_GA4_MEASUREMENT_ID="${{ secrets.VITE_GA4_MEASUREMENT_ID }}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" \
            -t newmeca-nginx:latest \
            .

      - name: Push backend image to Lightsail
        id: push-backend
        run: |
          output=$(aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --label backend \
            --image newmeca-backend:latest 2>&1)
          echo "$output"
          backend_image=$(echo "$output" | grep "Refer to this image as" | sed 's/.*Refer to this image as "\(.*\)".*/\1/')
          echo "image=$backend_image" >> "$GITHUB_OUTPUT"

      - name: Push nginx image to Lightsail
        id: push-nginx
        run: |
          output=$(aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --label nginx \
            --image newmeca-nginx:latest 2>&1)
          echo "$output"
          nginx_image=$(echo "$output" | grep "Refer to this image as" | sed 's/.*Refer to this image as "\(.*\)".*/\1/')
          echo "image=$nginx_image" >> "$GITHUB_OUTPUT"

      - name: Build deployment config from template and deploy
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
        run: |
          echo "Backend image: ${{ steps.push-backend.outputs.image }}"
          echo "Nginx image: ${{ steps.push-nginx.outputs.image }}"

          # Build deployment.json from template + GitHub Secrets
          jq \
            --arg backend "${{ steps.push-backend.outputs.image }}" \
            --arg nginx "${{ steps.push-nginx.outputs.image }}" \
            --arg database_url "${{ secrets.DATABASE_URL }}" \
            --arg supabase_url "${{ secrets.SUPABASE_URL }}" \
            --arg supabase_anon_key "${{ secrets.SUPABASE_ANON_KEY }}" \
            --arg supabase_service_role_key "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --arg stripe_secret_key "${{ secrets.STRIPE_SECRET_KEY }}" \
            --arg stripe_webhook_secret "${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --arg cors_origin "${{ secrets.CORS_ORIGIN }}" \
            --arg recaptcha_secret_key "${{ secrets.RECAPTCHA_SECRET_KEY }}" \
            --arg super_admin_password "${{ secrets.SUPER_ADMIN_PASSWORD }}" \
            --arg ga4_property_id "${{ secrets.GA4_PROPERTY_ID }}" \
            --arg usps_consumer_key "${{ secrets.USPS_CONSUMER_KEY }}" \
            --arg usps_consumer_secret "${{ secrets.USPS_CONSUMER_SECRET }}" \
            --arg google_maps_api_key "${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            --arg mailgun_domain "${{ secrets.MAILGUN_DOMAIN }}" \
            --arg mailgun_api_key "${{ secrets.MAILGUN_API_KEY }}" \
            --arg frontend_url "${{ secrets.FRONTEND_URL }}" \
            --arg cc_api_key "${{ secrets.CONSTANT_CONTACT_API_KEY }}" \
            --arg cc_client_secret "${{ secrets.CONSTANT_CONTACT_CLIENT_SECRET }}" \
            --arg cc_access_token "${{ secrets.CONSTANT_CONTACT_ACCESS_TOKEN }}" \
            --arg cc_refresh_token "${{ secrets.CONSTANT_CONTACT_REFRESH_TOKEN }}" \
            --arg cc_list_id "${{ secrets.CONSTANT_CONTACT_LIST_ID }}" \
            --arg contact_form_email "${{ secrets.CONTACT_FORM_EMAIL }}" \
            --arg enable_test_mode "${{ secrets.ENABLE_TEST_MODE }}" \
            --arg paypal_client_id "${{ secrets.PAYPAL_CLIENT_ID }}" \
            --arg paypal_client_secret "${{ secrets.PAYPAL_CLIENT_SECRET }}" \
            '
            .containers.backend.image = $backend |
            .containers.nginx.image = $nginx |
            .containers.backend.environment.DATABASE_URL = $database_url |
            .containers.backend.environment.SUPABASE_URL = $supabase_url |
            .containers.backend.environment.SUPABASE_ANON_KEY = $supabase_anon_key |
            .containers.backend.environment.SUPABASE_SERVICE_ROLE_KEY = $supabase_service_role_key |
            .containers.backend.environment.STRIPE_SECRET_KEY = $stripe_secret_key |
            .containers.backend.environment.STRIPE_WEBHOOK_SECRET = $stripe_webhook_secret |
            .containers.backend.environment.CORS_ORIGIN = $cors_origin |
            .containers.backend.environment.RECAPTCHA_SECRET_KEY = $recaptcha_secret_key |
            .containers.backend.environment.SUPER_ADMIN_PASSWORD = $super_admin_password |
            .containers.backend.environment.GA4_PROPERTY_ID = $ga4_property_id |
            .containers.backend.environment.GA4_CREDENTIALS_JSON = $ENV.GA4_CREDENTIALS_JSON |
            .containers.backend.environment.USPS_CONSUMER_KEY = $usps_consumer_key |
            .containers.backend.environment.USPS_CONSUMER_SECRET = $usps_consumer_secret |
            .containers.backend.environment.GOOGLE_MAPS_API_KEY = $google_maps_api_key |
            .containers.backend.environment.MAILGUN_DOMAIN = $mailgun_domain |
            .containers.backend.environment.MAILGUN_API_KEY = $mailgun_api_key |
            .containers.backend.environment.FRONTEND_URL = $frontend_url |
            .containers.backend.environment.CONSTANT_CONTACT_API_KEY = $cc_api_key |
            .containers.backend.environment.CONSTANT_CONTACT_CLIENT_SECRET = $cc_client_secret |
            .containers.backend.environment.CONSTANT_CONTACT_ACCESS_TOKEN = $cc_access_token |
            .containers.backend.environment.CONSTANT_CONTACT_REFRESH_TOKEN = $cc_refresh_token |
            .containers.backend.environment.CONSTANT_CONTACT_LIST_ID = $cc_list_id |
            .containers.backend.environment.CONTACT_FORM_EMAIL = $contact_form_email |
            .containers.backend.environment.ENABLE_TEST_MODE = $enable_test_mode |
            .containers.backend.environment.PAYPAL_CLIENT_ID = $paypal_client_id |
            .containers.backend.environment.PAYPAL_CLIENT_SECRET = $paypal_client_secret
            ' deploy/deployment.template.json > /tmp/deployment.json

          echo "Deployment config (secrets masked):"
          jq '.containers.backend.environment | keys' /tmp/deployment.json

          # Create the deployment
          aws lightsail create-container-service-deployment \
            --region ${{ env.AWS_REGION }} \
            --cli-input-json file:///tmp/deployment.json

      - name: Verify deployment started
        run: |
          echo "Deployment initiated. Checking status..."
          aws lightsail get-container-services \
            --service-name ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'containerServices[0].{state:state,url:url}' \
            --output table
